services:
  pyremoteplay:
    build:
      context: ./pyremoteplay
      dockerfile: Dockerfile
    image: pyremoteplay-sidecar:latest
    restart: unless-stopped
    # host networking so pyremoteplay can do UDP discovery + Remote Play
    # streaming with the PS5 directly on the LAN (no port forwarding pain).
    network_mode: host
    environment:
      - PYREMOTEPLAY_SIDECAR_HOST=127.0.0.1
      - PYREMOTEPLAY_SIDECAR_PORT=9555
      - PYREMOTEPLAY_SIDECAR_LOG=info

  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Run as the host user that owns the repo (dietpi = 1000:1000). Keeps
    # files written through the built-in editor — and any newly downloaded
    # default payloads — owned by the host user instead of root, so you can
    # edit/commit them normally without sudo.
    user: "1000:1000"
    volumes:
      - ./data:/app/data
      # Live mount of the editable built-ins folder. Saves from the hidden
      # editor (#builtin) land in this directory on the host, so edits are
      # tracked by git and survive `docker compose build`. The image still
      # ships a default copy at /app/builtin (see Dockerfile) so plain
      # `docker run` without compose keeps working.
      - ./frontend/builtin:/app/builtin
      # Host filesystem exposed to the file browser. Each entry below MUST
      # match the candidate list in backend/src/routes/downloader.js so every
      # "quick tab" rendered in the FileBrowser actually resolves to a real
      # directory — no dead chips. /mnt alone is enough: any disks the host
      # has already mounted at /mnt/sda1, /mnt/sdb1, etc. are visible inside
      # the container through the parent bind mount, no separate entries
      # required.
      - /mnt:/mnt
      - /home:/home
      - /data:/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/app/data
      - PYREMOTEPLAY_SIDECAR_URL=http://127.0.0.1:9555
    depends_on:
      - pyremoteplay
    restart: unless-stopped
    network_mode: host
